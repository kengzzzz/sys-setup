x-llama-build-args: &llama-build-args
  BASE_CUDA_DEV_CONTAINER: nvidia/cuda@sha256:44a9504c6dfb50b1241464241b02a93871928f373de6f5a644cf5fe9f080aa63 # nvidia/cuda version: 13.2.1-devel-ubuntu24.04
  LLAMA_CPP_REPO: https://github.com/ggml-org/llama.cpp.git
  LLAMA_CPP_COMMIT: 1e5ad35d560b90a8ac447d149c8f8447ae1fcaa0
  CUDA_ARCH: 89-real
  CUDA_COMPRESSION_MODE: speed

x-model-volume: &model-volume
  type: bind
  source: ./models
  target: /models

x-llama-service: &llama-service
  build:
    context: .
    dockerfile: Dockerfile
    args: *llama-build-args
  env_file:
    - ${LLAMA_ENV_FILE:-.env}
  user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
  gpus: all
  ipc: host
  ulimits:
    memlock: -1
    stack: 67108864
  working_dir: /models
  environment:
    NVIDIA_VISIBLE_DEVICES: all
    NVIDIA_DRIVER_CAPABILITIES: compute,utility
    HOME: /models/home
    XDG_CACHE_HOME: /models/.cache
    HF_HOME: /models/hf-home
    HUGGINGFACE_HUB_CACHE: /models/hf-home/hub
    SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
  volumes:
    - *model-volume

x-tailscale-image: &tailscale-image
  ghcr.io/tailscale/tailscale@sha256:dbeff02d2337344b351afac203427218c4d0a06c43fc10a865184063498472a6

x-tailscale-volume: &tailscale-volume
  type: bind
  source: ./tailscale/state
  target: /var/lib/tailscale

services:
  tailscale:
    image: *tailscale-image
    container_name: tailscale
    hostname: llama-server
    env_file:
      - ${LLAMA_ENV_FILE:-.env}
    environment:
      TS_ACCEPT_DNS: "false"
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - *tailscale-volume
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    restart: unless-stopped

  llama-server:
    <<: *llama-service
    build:
      context: .
      dockerfile: Dockerfile
      target: server
      args: *llama-build-args
    image: llama-server
    container_name: llama-server
    depends_on:
      - tailscale
    network_mode: service:tailscale
