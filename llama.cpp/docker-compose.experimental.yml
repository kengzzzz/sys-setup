x-llama-build-args: &llama-build-args
  BASE_CUDA_DEV_CONTAINER: nvidia/cuda@sha256:44a9504c6dfb50b1241464241b02a93871928f373de6f5a644cf5fe9f080aa63
  LLAMA_CPP_REPO: https://github.com/TheTom/llama-cpp-turboquant.git
  LLAMA_CPP_COMMIT: 5aeb2fdbe26cd4c534c6fa15de73cb5749bd0403
  CUDA_ARCH: 89-real
  CUDA_COMPRESSION_MODE: speed

x-model-volume: &model-volume
  type: bind
  source: ./models
  target: /models

x-tailscale-image: &tailscale-image
  ghcr.io/tailscale/tailscale@sha256:dbeff02d2337344b351afac203427218c4d0a06c43fc10a865184063498472a6

x-tailscale-volume: &tailscale-volume
  type: bind
  source: ./tailscale/state
  target: /var/lib/tailscale

services:
  tailscale:
    image: *tailscale-image
    container_name: tailscale-turboquant
    hostname: llama-server-turboquant
    env_file:
      - ${EXPERIMENTAL_LLAMA_ENV_FILE:-.env.turboquant}
    environment:
      TS_ACCEPT_DNS: "false"
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - *tailscale-volume
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    restart: unless-stopped

  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.experimental
      target: server
      args: *llama-build-args
    image: llama-server-turboquant
    container_name: llama-server-turboquant
    depends_on:
      - tailscale
    network_mode: service:tailscale
    env_file:
      - ${EXPERIMENTAL_LLAMA_ENV_FILE:-.env.turboquant}
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    gpus: all
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    working_dir: /models
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HOME: /models/home
      XDG_CACHE_HOME: /models/.cache
      HF_HOME: /models/hf-home
      HUGGINGFACE_HUB_CACHE: /models/hf-home/hub
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    volumes:
      - *model-volume
